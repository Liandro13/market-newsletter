<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f8fafc;
            color: #1e293b;
            line-height: 1.6;
        }
        .container {
            max-width: 680px;
            margin: 0 auto;
            background: #ffffff;
        }
        .header {
            background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%);
            color: white;
            padding: 32px 24px;
            text-align: center;
        }
        .header h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 4px;
        }
        .header .subtitle {
            font-size: 14px;
            color: #94a3b8;
            font-weight: 400;
        }
        .header .date {
            font-size: 13px;
            color: #64748b;
            margin-top: 8px;
        }
        .content {
            padding: 24px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 12px 0;
            font-size: 13px;
        }
        th {
            background: #f1f5f9;
            color: #475569;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.5px;
            padding: 8px 12px;
            text-align: left;
            border-bottom: 2px solid #e2e8f0;
        }
        td {
            padding: 8px 12px;
            border-bottom: 1px solid #f1f5f9;
        }
        tr:hover td { background: #f8fafc; }
        .positive { color: #10b981; font-weight: 600; }
        .negative { color: #ef4444; font-weight: 600; }
        h2 {
            font-size: 18px;
            margin: 28px 0 12px 0;
            padding-bottom: 8px;
            border-bottom: 2px solid #e2e8f0;
            color: #0f172a;
        }
        h3 {
            font-size: 15px;
            color: #334155;
            margin: 16px 0 8px 0;
        }
        p { margin: 8px 0; font-size: 14px; color: #475569; }
        .highlight-box {
            background: #f0f9ff;
            border-left: 4px solid #3b82f6;
            padding: 12px 16px;
            margin: 12px 0;
            border-radius: 0 6px 6px 0;
        }
        .footer {
            background: #f8fafc;
            padding: 20px 24px;
            text-align: center;
            font-size: 12px;
            color: #94a3b8;
            border-top: 1px solid #e2e8f0;
        }
        @media (max-width: 600px) {
            .container { width: 100% !important; }
            .content { padding: 16px; }
            table { font-size: 12px; }
            th, td { padding: 6px 8px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Market Pulse</h1>
            <div class="subtitle">{{ subtitle }}</div>
            <div class="date">{{ date }}</div>
        </div>
        <div class="content">
            {{ content }}
        </div>
        <div class="footer">
            <p>Market Pulse Newsletter — Gerado automaticamente com dados de mercado e análise AI</p>
            <p>Os dados apresentados são informativos e não constituem aconselhamento financeiro.</p>
        </div>
    </div>
</body>
</html>
